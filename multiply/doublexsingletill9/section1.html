/* Company Brand Theme Overrides */
:root {
    --bg-color: #122C3D;
    --text-color: #E0E6EB;
    --surface-color: #1D4057;
    --border-color: #122C3D;
    --input-bg: #122C3D;
    --input-border: #1D4057;
    --heading-bg: #27AE60;
    --heading-text: #FFFFFF;
    --btn-bg: #27AE60;
    --btn-hover: #219653;
}
html[data-theme="light"], body[data-theme="light"] {
    --bg-color: #F4F6F8;
    --text-color: #1A252C;
    --surface-color: #FFFFFF;
    --border-color: #D5DBDB;
    --input-bg: #FFFFFF;
    --input-border: #BDC3C7;
    --heading-bg: #27AE60;
    --heading-text: #FFFFFF;
    --btn-bg: #27AE60;
    --btn-hover: #219653;
}
html, body {
    background-color: var(--bg-color) !important;
    background: var(--bg-color) !important;
    color: var(--text-color) !important;
    font-family: 'Poppins', sans-serif !important;
    height: auto !important;
    overflow: hidden !important;
    transition: background-color 0.3s, color 0.3s;
}
body {
    padding: 20px !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
}
h2 {
    color: var(--text-color) !important;
    font-family: 'Poppins', sans-serif !important;
    font-size: 26px !important;
    text-align: center !important;
    margin-bottom: 20px !important;
}
table {
    border: 1px solid var(--input-border) !important;
    background-color: var(--surface-color) !important;
    border-collapse: separate !important;
    border-spacing: 0 10px !important;
    margin: 0 auto !important;
    color: var(--text-color) !important;
    width: 100% !important;
    max-width: 1100px !important;
}
td, th {
    border: 1px solid var(--border-color) !important;
    color: var(--text-color) !important;
    font-family: 'Poppins', sans-serif !important;
    padding: 10px !important;
    background-color: var(--surface-color) !important;
}
/* Header row coloring (number cells 1 to 10) */
td[style*="background-color: #F43308"],
td[style*="background-color: rgb(244, 51, 8)"] {
    background-color: var(--heading-bg) !important;
    color: var(--heading-text) !important;
}
/* Editable cells styling */
td[contenteditable="true"], td#ans {
    background-color: var(--input-bg) !important;
    border: 2px solid var(--input-border) !important;
    color: var(--text-color) !important;
    outline: none !important;
    transition: border-color 0.2s !important;
}
td[contenteditable="true"]:focus, td#ans:focus {
    border-color: var(--heading-bg) !important;
}
/* Check result colors */
.correct, 
#editable td[style*="background-color: green"], 
#editable td[style*="background-color: #58D68D"], 
#editable td[style*="background-color: rgb(88, 214, 141)"] {
    background-color: #27AE60 !important;
    color: #FFFFFF !important;
}
.wrong, 
#editable td[style*="background-color: red"], 
#editable td[style*="background-color: #A0002C"], 
#editable td[style*="background-color: rgb(160, 0, 44)"] {
    background-color: #E74C3C !important;
    color: #FFFFFF !important;
}
/* Hide actual answers key by default to prevent space taking */
td#actual_ans {
    display: none !important;
}
/* Actual answer cells display */
#answer td,
td#actual_ans[style*="background"], 
td[style*="background-color: #9AD1F7"], 
td[style*="background-color: rgb(154, 209, 247)"] {
    background-color: #2980B9 !important;
    color: #FFFFFF !important;
    display: table-cell !important;
}
/* Check Result Buttons styling */
.button, button {
    background-color: var(--btn-bg) !important;
    color: #FFFFFF !important;
    border: none !important;
    border-radius: 6px !important;
    padding: 12px 30px !important;
    font-size: 15px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: all 0.2s !important;
    box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3) !important;
    display: block !important;
    margin: 20px auto !important;
    font-family: 'Poppins', sans-serif !important;
}
.button:hover, button:hover {
    background-color: var(--btn-hover) !important;
    transform: translateY(-1px) !important;
}
h2#ansLabel, h2#res {
    color: var(--text-color) !important;
    text-align: center !important;
    font-size: 20px !important;
    margin-top: 15px !important;
}

</style>

</head>
	<body>

		<h2> 2 Digit X 1 Digit </h2>

		<script type="text/javascript">

		window.onload = DiaplayTable();

		function InsertRowInTable(table1, index)
		{
			table1.insertRow();
			table1.style="border: none;";
			table1.id = "sums";
			
			var part1 = Math.floor((Math.random() * 80) + 20);
			var part2 = Math.floor((Math.random() * 9) + 1);
			
			let newCell1 = table1.rows[index].insertCell();	
			newCell1.textContent = part1;
			newCell1.id = "part1"

			let CellOper = table1.rows[index].insertCell();	
			CellOper.textContent = 'X';
			CellOper.style="border-top: none;border-bottom: none;border-left: none;border-right: none;";
			
			let newCell2 = table1.rows[index].insertCell();	
			newCell2.textContent = part2;
			newCell2.id = "part2"

			let cellEqual = table1.rows[index].insertCell();	
			cellEqual.textContent = '=';
			cellEqual.style="border-top: none;border-bottom: none;border-left: none;border-right: none;";

			let cellAns = table1.rows[index].insertCell();	
			cellAns.contentEditable = "true";
			cellAns.style="height: 50px; background-color: #f9ebea;";
			cellAns.id = "ans"

			let actualAns = table1.rows[index].insertCell();
			actualAns.id = "actual_ans"
			actualAns.style.visibility = 'hidden';
			
		}
		
		
		function DiaplayTable() 
		{
			let table1 = document.createElement('table');

			for (let i = 0; i < 20; i++) {
				InsertRowInTable(table1,i);	
			}
			
									table1.addEventListener('keypress', function(e) {
				let currentCell = e.target;
				if (currentCell.tagName === 'TD' && currentCell.id === 'ans') {
					if (!/[0-9\-\.]/.test(e.key) && e.key !== 'Enter') {
						e.preventDefault();
					}
				}
			});
			table1.addEventListener('paste', function(e) {
				let currentCell = e.target;
				if (currentCell.tagName === 'TD' && currentCell.id === 'ans') {
					e.preventDefault();
					let text = (e.originalEvent || e).clipboardData.getData('text/plain');
					if (/^\-?[0-9\.]*$/.test(text)) {
						document.execCommand('insertText', false, text);
					}
				}
			});
			table1.addEventListener('keydown', function(e) {
				if (e.key === 'Enter') {
					e.preventDefault();
					let currentCell = e.target;
					if (currentCell.tagName === 'TD' && currentCell.id === 'ans') {
						let currentRow = currentCell.parentElement;
						let nextRow = currentRow.nextElementSibling;
						if (nextRow && nextRow.tagName === 'TR') {
							let nextCell = nextRow.querySelector('#ans') || nextRow.cells[currentCell.cellIndex];
							if (nextCell) {
								nextCell.focus();
								let range = document.createRange();
								let sel = window.getSelection();
								range.selectNodeContents(nextCell);
								range.collapse(false);
								sel.removeAllRanges();
								sel.addRange(range);
							}
						}
					}
				}
			});
			document.body.appendChild(table1);

		}

		function Check()
		{
				var table_sums = document.getElementById("sums");
				var wrong = 0;
				var isAnyAnswerLeft = 0;
				
				
				for (var i = 0, row; row = table_sums.rows[i]; i++)
				{  
				   for (var j = 0, col; col = row.cells[j]; j++)
				   {
						if(col.id == "ans")
						{
							var val = col.innerHTML;

							if( val == "")
							{
								isAnyAnswerLeft = 1;
							}
						}
				   }
				}
				
				for (var i = 0, row; row = table_sums.rows[i]; i++)
				{
				   //iterate through rows
				   //rows would be accessed using the "row" variable assigned in the for loop
				   var part1 = -1;
				   var part2 = -1;
				   var answer = -1;
				   
				   for (var j = 0, col; col = row.cells[j]; j++)
				   {
						//iterate through columns
						//columns would be accessed using the "col" variable assigned in the for loop
						var anscell = -1;

						if(col.id == "part1")
						{
							var val = col.innerHTML;

							if( val != "")
							{
								part1 = parseInt(col.innerHTML)
							}
						}

						if(col.id == "part2")
						{
							var val = col.innerHTML;

							if( val != "")
							{
								part2 = parseInt(col.innerHTML)
							}
						}

						if(col.id == "ans")
						{
							var val = col.innerHTML;

							if( val != "")
							{
								answer = parseInt(col.innerHTML.trim())
							}	
							var oper = part1 * part2;
						
							if (oper != answer && answer != -1)
							{
								wrong = wrong + 1;
								col.style="background-color: #A0002C; color:white"
							}
							else
							{
								col.style="background-color: #58D68D  ;"
							}
							
						}
						
						if(col.id == "actual_ans")
						{
							var total = 20;
							if(isAnyAnswerLeft == 0)
							{
								col.style = "background-color: #9AD1F7  ;"
								col.id = "actual_ans"
								col.innerHTML = oper
								col.style.visibility = '';
								
								var ansLabel = document.getElementById("ansLabel");
								var res = document.getElementById("res");
								ansLabel.innerHTML = "Check your result below."
								var correct = total - wrong;
								res.innerHTML = "Result : " + correct.toString() + " / " + total.toString();
							}
							else
							{
								var ansLabel = document.getElementById("ansLabel");
								ansLabel.innerHTML = "Attempt all sums before seeing the Answers."
								var correct = total - wrong;
								res.innerHTML = "Result : " + correct.toString() + " / " + total.toString();
							}
						}						
					}						
				   
				}				

		}


		function IsNumeric(input)
		{
			document.getElementById("gk").innerHTML = "gk"
			return (input - 0) == input && (''+input).trim().length > 0;
		}

</script>

	<button class="button button4" onclick="Check()">Check</button>
	<h2 id="ansLabel" style="color: #D35400;"></h2>
	<h2 id="res" style="color: #D35400;"></h2>
			<script type="text/javascript">
			window.addEventListener('message', function(e) {
				if (e.data && e.data.type === 'SET_THEME') {
					document.documentElement.setAttribute('data-theme', e.data.theme);
					document.body.setAttribute('data-theme', e.data.theme);
				}
			});
			if (window.parent && window.parent !== window) {
				window.parent.postMessage({ type: 'REQUEST_THEME' }, '*');
			}
		</script>
