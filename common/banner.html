    <link href="lights.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .top-banner {
            background: linear-gradient(135deg, #122C3D 0%, #1D4057 100%) !important;
            border-bottom: 2px solid #27AE60;
            padding: 15px 0 !important;
        }
        .banner-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .banner-logo {
            height: 55px;
            width: auto;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }
        .banner-logo:hover {
            transform: scale(1.05) rotate(2deg);
        }
        .banner-titles {
            text-align: left;
            font-family: 'Poppins', sans-serif;
        }
        .banner-titles h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 1px;
            text-shadow: none;
            background: linear-gradient(to right, #FFFFFF, #E0E6EB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .banner-titles p {
            margin: 3px 0 0 0;
            font-size: 13px;
            color: #8FA0AC;
        }
        .light-row {
            background: #0d1f2b !important;
        }
        
        /* Brand Lightrope Colors override */
        .lightrope li {
            background: #27AE60 !important; /* Emerald Green */
            box-shadow: 0px 4px 24px 3px #27AE60 !important;
        }
        .lightrope li:nth-child(2n+1) {
            background: #3498db !important; /* Blue */
            box-shadow: 0px 4px 24px 3px #3498db !important;
        }
        .lightrope li:nth-child(4n+2) {
            background: #F1C40F !important; /* Gold */
            box-shadow: 0px 4px 24px 3px #F1C40F !important;
        }

        
        @media(max-width: 600px) {
            .banner-brand {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .banner-titles {
                text-align: center;
            }
            .banner-titles h1 {
                font-size: 22px;
            }
        }
        
        /* Light Theme Overrides */
        html[data-theme="light"] .top-banner,
        body[data-theme="light"] .top-banner {
            background: linear-gradient(135deg, #FFFFFF 0%, #EAECEE 100%) !important;
            border-bottom: 2px solid #27AE60;
        }
        html[data-theme="light"] .banner-titles h1,
        body[data-theme="light"] .banner-titles h1 {
            background: linear-gradient(to right, #122C3D, #1D4057) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }
        html[data-theme="light"] .banner-titles p,
        body[data-theme="light"] .banner-titles p {
            color: #5D6D7E !important;
        }
        html[data-theme="light"] .light-row,
        body[data-theme="light"] .light-row {
            background: #D5D8DC !important;
        }
    </style>
</head>
<body>
    <script>
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SET_THEME') {
            document.documentElement.setAttribute('data-theme', e.data.theme);
            document.body.setAttribute('data-theme', e.data.theme);
        }
    });
    if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'REQUEST_THEME' }, '*');
    }
    </script>
    <div class="top-banner">
        <div class="banner-brand">
            <a href="https://base2ace.com" target="_blank" rel="noopener noreferrer" style="display: flex;">
                <img src="../logo.png" alt="Base2ace Logo" class="banner-logo" onerror="this.src='../assets/Logo/b2a_logo_white.png'">
            </a>
            <div class="banner-titles">
                <h1>Base2Ace Academy</h1>
                <p>An ISO 9001:2015 Certified Company</p>
            </div>
        </div>
    </div>
