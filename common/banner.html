        .top-banner {
            background: linear-gradient(135deg, #122C3D 0%, #1D4057 100%) !important;
            border-bottom: 2px solid #27AE60;
            padding: 15px 0 !important;
        }
        .banner-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .banner-logo {
            height: 55px;
            width: auto;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }
        .banner-logo:hover {
            transform: scale(1.05) rotate(2deg);
        }
        .banner-titles {
            text-align: left;
            font-family: 'Poppins', sans-serif;
        }
        .banner-titles h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 1px;
            text-shadow: none;
            background: linear-gradient(to right, #FFFFFF, #E0E6EB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .banner-titles p {
            margin: 3px 0 0 0;
            font-size: 13px;
            color: #8FA0AC;
        }
        .light-row {
            background: #0d1f2b !important;
        }
        
        /* Brand Lightrope Colors override */
        .lightrope li {
            background: #27AE60 !important; /* Emerald Green */
            box-shadow: 0px 4px 24px 3px #27AE60 !important;
        }
        .lightrope li:nth-child(2n+1) {
            background: #3498db !important; /* Blue */
            box-shadow: 0px 4px 24px 3px #3498db !important;
        }
        .lightrope li:nth-child(4n+2) {
            background: #F1C40F !important; /* Gold */
            box-shadow: 0px 4px 24px 3px #F1C40F !important;
        }

        
        @media(max-width: 600px) {
            .banner-brand {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .banner-titles {
                text-align: center;
            }
            .banner-titles h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

            <div class="banner-titles">

                <p>An ISO 9001:2015 Certified Company</p>
            </div>
        </div>

    <script>
    function injectSectionStyles() {
        try {
            if (window.parent && window.parent !== window) {
                const parentDoc = window.parent.document;
                const iframes = parentDoc.querySelectorAll('iframe');
                
                iframes.forEach(iframe => {
                    // Skip banner and footer
                    if (iframe.src.indexOf('banner.html') !== -1 || iframe.src.indexOf('footer.html') !== -1) {
                        return;
                    }
                    
                    const inject = () => {
                        try {
                            const doc = iframe.contentDocument || iframe.contentWindow.document;
                            if (!doc || doc.getElementById('company-theme-style')) return;
                            
                            const style = doc.createElement('style');
                            style.id = 'company-theme-style';
                            style.textContent = `
                                /* Worksheet Iframe Dark Theme Overrides */
                                html, body {
                                    background-color: #122C3D !important;
                                    background: #122C3D !important;
                                    color: #E0E6EB !important;
                                    font-family: 'Poppins', sans-serif !important;
                                }
                                
                                body {
                                    padding: 20px !important;
                                    display: flex !important;
                                    flex-direction: column !important;
                                    align-items: center !important;
                                    justify-content: center !important;
                                }
                                
                                h2 {
                                    color: #FFFFFF !important;
                                    font-family: 'Poppins', sans-serif !important;
                                    font-size: 26px !important;
                                    text-align: center !important;
                                    margin-bottom: 20px !important;
                                }
                                
                                table {
                                    border: 1px solid #1D4057 !important;
                                    background-color: #1D4057 !important;
                                    border-collapse: separate !important;
                                    border-spacing: 0 10px !important;
                                    margin: 0 auto !important;
                                    color: #FFFFFF !important;
                                    width: 100% !important;
                                    max-width: 1100px !important;
                                }
                                
                                td, th {
                                    border: 1px solid #122C3D !important;
                                    color: #FFFFFF !important;
                                    font-family: 'Poppins', sans-serif !important;
                                    padding: 10px !important;
                                    background-color: #1D4057 !important;
                                }
                                
                                /* Header row coloring (number cells 1 to 10) */
                                tr:first-child td, tr:first-child th,
                                td[style*="background-color: #F43308"],
                                td[style*="background-color: rgb(244, 51, 8)"] {
                                    background-color: #27AE60 !important;
                                    color: #FFFFFF !important;
                                }
                                
                                /* Editable cells styling */
                                td[contenteditable="true"], td#ans {
                                    background-color: #122C3D !important;
                                    border: 2px solid #1D4057 !important;
                                    color: #FFFFFF !important;
                                    outline: none !important;
                                    transition: border-color 0.2s !important;
                                }
                                
                                td[contenteditable="true"]:focus, td#ans:focus {
                                    border-color: #27AE60 !important;
                                }
                                
                                /* Check result colors */
                                .correct, td[style*="background-color: green"], td[style*="background-color: #58D68D"], td[style*="background-color: rgb(88, 214, 141)"] {
                                    background-color: #27AE60 !important;
                                    color: #FFFFFF !important;
                                }
                                
                                .wrong, td[style*="background-color: red"], td[style*="background-color: #A0002C"], td[style*="background-color: rgb(160, 0, 44)"] {
                                    background-color: #E74C3C !important;
                                    color: #FFFFFF !important;
                                }
                                
                                /* Actual answer cells display */
                                td[id="actual_ans"], td[style*="background-color: #9AD1F7"], td[style*="background-color: rgb(154, 209, 247)"] {
                                    background-color: #2980B9 !important;
                                    color: #FFFFFF !important;
                                }
                                
                                /* Check Result Buttons styling */
                                .button, button {
                                    background-color: #27AE60 !important;
                                    color: #FFFFFF !important;
                                    border: none !important;
                                    border-radius: 6px !important;
                                    padding: 12px 30px !important;
                                    font-size: 15px !important;
                                    font-weight: 600 !important;
                                    cursor: pointer !important;
                                    transition: all 0.2s !important;
                                    box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3) !important;
                                    display: block !important;
                                    margin: 20px auto !important;
                                    font-family: 'Poppins', sans-serif !important;
                                }
                                
                                .button:hover, button:hover {
                                    background-color: #219653 !important;
                                    transform: translateY(-1px) !important;
                                }
                                
                                h2#ansLabel, h2#res {
                                    color: #E0E6EB !important;
                                    text-align: center !important;
                                    font-size: 20px !important;
                                    margin-top: 15px !important;
                                }
                            `;
                            doc.head.appendChild(style);
                        } catch (e) {
                            // Suppress errors (mostly during iframe loading transition)
                        }
                    };
                    
                    if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
                        inject();
                    } else {
                        iframe.addEventListener('load', inject);
                    }
                });
            }
        } catch (e) {
            console.error("Iframe theme injection error:", e);
        }
    }
    
    // Multi-stage trigger to guarantee styling updates
    setTimeout(injectSectionStyles, 50);
    setTimeout(injectSectionStyles, 250);
    setTimeout(injectSectionStyles, 750);
    setTimeout(injectSectionStyles, 1500);
    </script>
