<!DOCTYPE html>
<html>
<head>
    <style>
        /* Style for the top banner */
        .top-banner {
            background: linear-gradient(135deg, #122C3D 0%, #1D4057 100%) !important;
            border-top: 2px solid #27AE60;
            color: #E0E6EB;
            padding: 15px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .top-banner::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            z-index: -1;
        }

        h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
        }

        a {
            color: #FFFFFF;
            text-decoration: none;
            transition: color 0.2s, text-shadow 0.2s;
            font-size: 16px;
            font-weight: 600;
        }

        a:hover {
            color: #27AE60;
            text-shadow: 0 0 10px rgba(39, 174, 96, 0.4);
        }

        .separator {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 15px;
            font-weight: 300;
        }

        p {
            font-size: 8px;
            margin-top: 10px;
        }
        
        /* Light Theme Overrides */
        html[data-theme="light"] .top-banner,
        body[data-theme="light"] .top-banner {
            background: linear-gradient(135deg, #FFFFFF 0%, #EAECEE 100%) !important;
            border-top: 2px solid #27AE60;
            color: #1A252C;
        }
        html[data-theme="light"] a,
        body[data-theme="light"] a {
            color: #122C3D;
        }
        html[data-theme="light"] a:hover,
        body[data-theme="light"] a:hover {
            color: #27AE60;
        }
        html[data-theme="light"] .separator,
        body[data-theme="light"] .separator {
            color: rgba(18, 44, 61, 0.25);
        }
    </style>
    <!-- <script type="text/javascript" src="diwali.js"></script>  -->
    <!-- <script type="text/javascript" src="snow.js"></script>  -->
    <link href="https://fonts.googleapis.com/css?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <script>
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SET_THEME') {
            document.documentElement.setAttribute('data-theme', e.data.theme);
            document.body.setAttribute('data-theme', e.data.theme);
        }
    });
    if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'REQUEST_THEME' }, '*');
    }
    </script>
    <div class="top-banner">
        <h1>
            <a href="https://base2ace.com" target="_blank" rel="noopener noreferrer">Base2Ace Academy</a>
            <span class="separator">|</span>
            <a href="mailto:enquiry@base2ace.com" target="_blank" rel="noopener noreferrer">Send Email</a>
            <span class="separator">|</span>
            <a href="https://wa.me/919271899502" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </h1>
    </div>
    
    <!-- The rest of your webpage content goes here -->
</body>
</html>
