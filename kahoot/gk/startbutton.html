<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start the Game</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Hide overflow to prevent scrolling */
        position: relative; /* Set position to relative for absolute positioning of elements */
        background-color: #D2B48C; /* Set background color to a light brown */
    }

    button {
        position: absolute; /* Set position to absolute for easier hiding */
        top: 50%; /* Position the button in the vertical center */
        left: 50%; /* Position the button in the horizontal center */
        transform: translate(-50%, -50%); /* Center the button */
        font-size: 24px;
        font-weight: bold;
        padding: 20px 40px;
        border: 2px solid #000; /* Add a black border */
        border-radius: 10px;
        background-color: #8B4513; /* Set button background color to brown */
        color: #fff; /* Set text color to white */
        cursor: pointer;
        transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transitions for button color change */
    }

    button:hover {
        background-color: #A0522D; /* Lighten the background color on hover */
        color: #fff; /* Change text color to white on hover */
    }

    .number-container {
        position: absolute; /* Set position to absolute for easier positioning */
        top: 50%; /* Position the container in the vertical center */
        left: 50%; /* Position the container in the horizontal center */
        transform: translate(-50%, -50%); /* Center the container */
        font-size: 50px; /* Set font size for the numbers */
        color: #8B0000; /* Set number color to brown */
        font-weight: bold;
        animation: zoom 1s infinite alternate; /* Zoom animation */
    }

    @keyframes zoom {
        0% {
            transform: scale(1); /* Initial scale */
        }
        100% {
            transform: scale(2); /* Final scale */
        }
    }
</style>
</head>
<body>
    <button onclick="startGame()">Click to start the game</button>

    <script>
        function startGame() {
            // Hide the button
            document.querySelector('button').style.display = 'none';

            // Display numbers sequentially with delay
            var numbers = [1, 2, 3, "Go"];
            var index = 0;
            var interval = setInterval(function() {
                if (index < numbers.length) {
                    // Remove the previous number container
                    var previousContainer = document.querySelector('.number-container');
                    if (previousContainer) {
                        previousContainer.remove();
                    }

                    // Create a container for the current number
                    var container = document.createElement('div');
                    container.classList.add('number-container');
                    container.textContent = numbers[index];
                    document.body.appendChild(container);

                    // Increment index for the next number
                    index++;
                } else {
                    // Clear the interval after displaying all numbers
                    clearInterval(interval);

                    // Redirect to Google.com after a delay
                    setTimeout(function() {
                        window.location.href = 'kahoot.html';
                    }, 3000); // Delay in milliseconds (3 seconds)
                }
            }, 1000); // Delay in milliseconds (1 second)
		
        }
    </script>
</body>
</html>
